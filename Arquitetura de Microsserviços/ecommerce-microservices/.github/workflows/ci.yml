name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build --workspace=@ecommerce/events --workspace=@ecommerce/common

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Unit tests
        run: npm run test --workspaces --if-present
        env:
          CI: true

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      matrix:
        service: [user-service, product-service, search-service, cart-service, order-service, payment-service, notification-service, api-gateway]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }}
        run: |
          dir="services/${{ matrix.service }}"
          if [ "${{ matrix.service }}" = "api-gateway" ]; then dir="api-gateway"; fi
          if [ -f "$dir/Dockerfile" ]; then
            docker build -t ${{ matrix.service }}:test "$dir"
          else
            echo "No Dockerfile in $dir, skipping"
          fi
